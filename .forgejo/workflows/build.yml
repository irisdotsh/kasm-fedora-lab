name: build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - tests/**
      - .forgejo/workflows/build.yml
  pull_request:
    paths:
      - Dockerfile
      - tests/**
      - .forgejo/workflows/build.yml
  schedule:
    # Weekly rebuild: picks up the rolling-daily base plus latest
    # Firefox Dev / Postman / Bitwarden (their download URLs are always-latest)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Forgejo's built-in container registry (this instance's host)
  REGISTRY: git.irisblankenship.me
  TEST_TAG: kasm-fedora-lab:ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Resolved against the runner's default actions URL (code.forgejo.org).
      - uses: actions/checkout@v4

      # This runner spawns jobs inside a dind sidecar and injects
      # DOCKER_HOST=tcp://docker-in-docker:2375 -- but that name only resolves
      # on the runner's own network, not inside the dind where this job runs.
      # The dind daemon *is* reachable at this job's default-route gateway, so
      # repoint DOCKER_HOST there (with a probe so the log confirms it).
      - name: Point DOCKER_HOST at the dind daemon
        shell: bash
        run: |
          echo "runner-injected DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          gw=$(ip -4 route show default | awk '{print $3; exit}')
          if [ -z "$gw" ]; then echo "could not determine default gateway"; ip -4 route; exit 1; fi
          echo "default gateway: $gw  ->  DOCKER_HOST=tcp://$gw:2375"
          if (exec 3<>/dev/tcp/"$gw"/2375) 2>/dev/null; then
            echo "ok: $gw:2375 is reachable"
          else
            echo "WARNING: $gw:2375 not reachable -- the daemon may be elsewhere"
          fi
          echo "DOCKER_HOST=tcp://$gw:2375" >> "$GITHUB_ENV"

      # docker/* actions aren't mirrored on code.forgejo.org, so pull them
      # straight from GitHub by full URL.
      - uses: https://github.com/docker/setup-buildx-action@v3

      - name: Lint Dockerfile (BuildKit build checks)
        run: docker buildx build --check .

      - name: Build image (local, for testing)
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true
          # Scheduled/manual runs bust the cache so the "latest" download
          # layers (Firefox Dev, Postman, Bitwarden) actually re-fetch
          no-cache: ${{ forgejo.event_name == 'schedule' || forgejo.event_name == 'workflow_dispatch' }}
          tags: ${{ env.TEST_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Remote dind can't see the runner's filesystem, so copy the tests into a
      # container with `docker cp` instead of bind-mounting them.
      - name: Smoke test (binaries, policies, groups, theme)
        run: |
          cid=$(docker run -d --entrypoint sleep "$TEST_TAG" 600)
          docker cp tests/. "$cid:/tests"
          docker exec "$cid" bash /tests/smoke.sh; rc=$?
          docker rm -f "$cid" >/dev/null
          exit $rc

      # The Actions runner doesn't have sysbox, so --privileged stands in for
      # sysbox-runc here. KasmVNC is health-checked from *inside* the container
      # (curl localhost) because with remote dind the published port isn't
      # reachable on the job's own localhost.
      - name: Boot test (KasmVNC) + docker-in-docker test
        run: |
          # -v /var/lib/docker: inner Docker's storage must not sit on the
          # container's overlayfs (containerd snapshotter can't nest overlay).
          # Mirrors the lab_dind volume in compose / sysbox's implicit mount.
          docker run -d --name lab --privileged \
            -v /var/lib/docker \
            -e VNC_PW=citest "$TEST_TAG"

          echo "waiting for KasmVNC..."
          ok=0
          for i in $(seq 1 45); do
            if docker exec lab curl -skf -u kasm_user:citest https://localhost:6901/ >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            docker logs lab
            exit 1
          fi
          echo "KasmVNC is up"

          echo "testing inner docker..."
          docker exec --user 1000 lab bash -c '
            /dockerstartup/custom_startup.sh
            for i in $(seq 1 20); do
              docker info >/dev/null 2>&1 && break
              sleep 2
            done
            docker info >/dev/null || { cat /tmp/dockerd.log; exit 1; }
            docker run --rm hello-world
          '
          docker rm -fv lab

      - name: Log in to Forgejo container registry
        if: forgejo.event_name != 'pull_request'
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ forgejo.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Image metadata
        if: forgejo.event_name != 'pull_request'
        id: meta
        uses: https://github.com/docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ forgejo.repository_owner }}/kasm-fedora-lab
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha

      - name: Push to Forgejo container registry
        if: forgejo.event_name != 'pull_request'
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
