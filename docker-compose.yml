services:
  fedora-lab:
    build: .
    image: git.irisblankenship.me/iris/kasm-fedora-lab:latest
    container_name: kasm-fedora-lab
    hostname: kasm-fedora-lab   # runtime sets the hostname, not the Dockerfile
    restart: unless-stopped
    privileged: true            # inner dockerd needs it (was sysbox-runc, which
                                # gave unprivileged dind but required sysbox-ce
                                # on a Linux host)
    shm_size: 2g
    dns:
      - 10.0.10.5             # private DNS -- resolves git.irisblankenship.me etc.
    environment:
      - VNC_PW=changeme
    ports:
      - "6905:6901"
    volumes:
      - lab_home:/home/kasm-user
      - lab_dind:/var/lib/docker   # inner Docker storage: must not sit on the
                                   # container's overlayfs (can't nest overlay)
      - lab_twingate:/etc/twingate # twingate auth/config survives redeploys

  # Cloudflare tunnel connector. Create a remotely-managed tunnel in the
  # Zero Trust dashboard (Networks -> Tunnels), put its token in .env as
  # TUNNEL_TOKEN, and add a public hostname pointing at the workspace:
  #   service: https://fedora-lab:6901, TLS -> No TLS Verify on
  # (KasmVNC's cert is self-signed; cloudflared reaches it over the compose
  # network by service name, so no extra published ports are needed.)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kasm-fedora-lab-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env (Zero Trust -> Networks -> Tunnels)}
    depends_on:
      - fedora-lab

volumes:
  lab_home:
  lab_dind:
  lab_twingate:
